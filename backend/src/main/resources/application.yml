spring:
  application: { name: uplusitpms-api }
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/uplusitpms}
    username: ${SPRING_DATASOURCE_USERNAME:pms}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  jpa:
    hibernate: { ddl-auto: validate }
    open-in-view: false
    properties: { hibernate.default_schema: public }
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis: { host: ${SPRING_DATA_REDIS_HOST:localhost}, port: 6379 }
server:
  port: 9090
  servlet: { context-path: / }
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
    access-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-days: ${JWT_REFRESH_DAYS:7}
